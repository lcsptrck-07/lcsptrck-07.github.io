      <p data-i18n="about.p1">Sou Lucas Patrick, Content Designer e UX Writer com mais de 7 anos de experiência em interfaces digitais. Atuo na criação de textos para produtos #mobilefirst, fluxos conversacionais, chatbots e guias de redação — sempre com foco em clareza, escalabilidade e impacto real para o usuário.</p>
