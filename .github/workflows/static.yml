    <div class="plus" style="top:160px;left:90px;">+</div>
    <div class="plus" style="top:240px;right:140px;">+</div>
    <h1 data-i18n="hero.h1">oi, sou lucas patrick, às vezes <em>content designer</em>, às vezes estrategista,<br>mas <em>sempre</em> um escritor. feito de palavras… e é isso que tem na minha jornada</h1>
