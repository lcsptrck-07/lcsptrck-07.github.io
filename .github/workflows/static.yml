      <div class="grid-item" data-index="3"><div class="img-placeholder ph-7"></div><div class="caption"><span class="title" data-i18n="proj.3.title">Migração ao novo admin</span><span class="brand">Nuvemshop</span><span class="plus-icon">+</span></div></div>
